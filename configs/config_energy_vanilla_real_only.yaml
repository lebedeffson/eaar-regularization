dataset:
  train_data: data/energy_efficiency.csv
  validation_data: data/energy_efficiency.csv
  normalize_sum: false
  test_size: 0.2
  random_state: 42
  feature_columns:
    - relative_compactness
    - surface_area
    - wall_area
    - roof_area
    - overall_height
    - orientation
    - glazing_area
    - glazing_area_distribution
  target_columns:
    - heating_load
    - cooling_load
  feature_count: 8
  target_count: 2

model:
  num_rules: 16
  mf_class: Gaussian
  vanishing_strategy: blend
  optim: OriginalPSO
  reg_lambda: 0.001
  seed: 42
  n_workers: 4
  optim_params:
    epoch: 120
    pop_size: 80
    verbose: false

output:
  results_dir: results/energy_efficiency
  save_model: true
  save_predictions: true
  save_plots: true
  save_samples: true
  sample_size: 8

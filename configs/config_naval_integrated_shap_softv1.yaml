dataset:
  train_data: data/naval_propulsion.csv
  validation_data: data/naval_propulsion.csv
  normalize_sum: false
  mix_with_real: false
  mix_ratio: 0.0
  test_size: 0.2
  random_state: 42
  feature_columns:
    - lever_position
    - gas_turbine_shaft_torque
    - gas_turbine_rate_of_revolutions
    - gas_generator_rate_of_revolutions
    - starboard_propeller_torque
    - hp_turbine_exit_temperature
    - gt_compressor_outlet_air_temperature
    - hp_turbine_exit_pressure
    - gt_compressor_outlet_air_pressure
    - gas_turbine_exhaust_gas_pressure
    - turbine_injection_control
    - fuel_flow
  target_columns:
    - gt_compressor_decay_state_coefficient
    - gt_turbine_decay_state_coefficient
  feature_count: 12
  target_count: 2

model:
  num_rules: 8
  mf_class: Gaussian
  vanishing_strategy: blend
  optim: OriginalPSO
  reg_lambda: 0.01
  seed: 42
  n_workers: 4
  optim_params:
    epoch: 60
    pop_size: 50
    verbose: false

shap_reg:
  enabled: true
  integrated_training: false
  training_mode: real_only
  use_pso_init: false
  pso_epochs: 60

  epochs: 4
  batch_size: 64
  lr: 0.00005
  train_output_only: true
  early_stopping_patience: 2
  early_stopping_min_delta: 0.000001
  restore_best_state: true

  gamma: 0.0002
  gamma_start: 0.00005
  gamma_end: 0.0002
  gamma_warmup_epochs: 0.5

  use_adaptive_gamma: true
  target_shap_ratio: 0.04
  min_convergence_slowdown: 0.2
  use_adaptive_weights: false
  use_true_shap: false
  active_components: [sparsity]

  use_improved_shap: true
  gamma_sparsity: 0.2
  gamma_consistency: 0.0
  gamma_faithfulness: 0.0
  gamma_stability: 0.0
  acceptance_min_delta_r2: -0.001
  accuracy_guard:
    enabled: true
    margin: 0.002
    weight: 5.0
  max_shap_ratio: 0.08
  max_guard_ratio: 0.10

  scalarization:
    mode: mean

  tikhonov:
    enabled: false
    lambda: 0.0
    order: 2
    energy_aware: false

  nonnegativity:
    enabled: false
    lambda: 0.0

output:
  results_dir: results/naval
  save_model: true
  save_predictions: true
  save_plots: true
  save_samples: true
  sample_size: 8

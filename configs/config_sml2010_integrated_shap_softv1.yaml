dataset:
  train_data: data/sml2010.csv
  validation_data: data/sml2010.csv
  normalize_sum: false
  mix_with_real: false
  mix_ratio: 0.0
  test_size: 0.2
  random_state: 42
  feature_columns:
    - weather_temperature
    - co2_comedor_sensor
    - co2_habitacion_sensor
    - humedad_comedor_sensor
    - humedad_habitacion_sensor
    - lighting_comedor_sensor
    - lighting_habitacion_sensor
    - precipitacion
    - meteo_exterior_crepusculo
    - meteo_exterior_viento
    - meteo_exterior_sol_oest
    - meteo_exterior_sol_est
    - meteo_exterior_sol_sud
    - meteo_exterior_piranometro
    - temperature_exterior_sensor
    - humedad_exterior_sensor
    - day_of_week
    - hour
    - minute
  target_columns:
    - temperature_comedor_sensor
    - temperature_habitacion_sensor
  feature_count: 19
  target_count: 2

model:
  num_rules: 12
  mf_class: Gaussian
  vanishing_strategy: blend
  optim: OriginalPSO
  reg_lambda: 0.01
  seed: 42
  n_workers: 4
  optim_params:
    epoch: 80
    pop_size: 60
    verbose: false

shap_reg:
  enabled: true
  integrated_training: false
  training_mode: real_only
  use_pso_init: false
  pso_epochs: 80

  epochs: 4
  batch_size: 64
  lr: 0.00005
  train_output_only: true
  early_stopping_patience: 2
  early_stopping_min_delta: 0.00005
  restore_best_state: true

  gamma: 0.0002
  gamma_start: 0.00005
  gamma_end: 0.0002
  gamma_warmup_epochs: 0.5

  use_adaptive_gamma: true
  target_shap_ratio: 0.04
  min_convergence_slowdown: 0.2
  use_adaptive_weights: false
  use_true_shap: false
  active_components: [sparsity]

  use_improved_shap: true
  gamma_sparsity: 0.2
  gamma_consistency: 0.0
  gamma_faithfulness: 0.0
  gamma_stability: 0.0
  acceptance_min_delta_r2: -0.001
  accuracy_guard:
    enabled: true
    margin: 0.003
    weight: 5.0
  max_shap_ratio: 0.08
  max_guard_ratio: 0.10

  scalarization:
    mode: mean

  tikhonov:
    enabled: false
    lambda: 0.0
    order: 2
    energy_aware: false

  nonnegativity:
    enabled: false
    lambda: 0.0

output:
  results_dir: results/sml2010
  save_model: true
  save_predictions: true
  save_plots: true
  save_samples: true
  sample_size: 8

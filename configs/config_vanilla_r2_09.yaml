dataset:
  # Используем только реальные данные для обучения
  train_data: normalized_data_with_q_375.csv  # Реальные данные
  validation_data: normalized_data_with_q_375.csv  # Те же данные для валидации
  normalize_sum: true
  mix_with_real: false  # НЕ смешиваем с синтетическими
  mix_ratio: 0.0  # Только реальные данные
  test_size: 0.25  # 75% на обучение, 25% на тест
  random_state: 42
  # Гибкая настройка колонок
  feature_prefix: "Q"
  feature_count: 10
  feature_index_start: 1
  target_prefix: ""
  target_count: 60
  target_index_start: 1
model:
  # МАКСИМАЛЬНЫЕ ПАРАМЕТРЫ ДЛЯ R² = 0.9
  num_rules: 50  # УВЕЛИЧЕНО: 50 правил для максимальной емкости
  mf_class: GBell  # GBell лучше для пиков спектра
  vanishing_strategy: blend
  optim: OriginalPSO
  reg_lambda: 0.001  # МИНИМАЛЬНАЯ регуляризация для максимальной гибкости
  seed: 42
  n_workers: 4
  optim_params:
    epoch: 150  # УВЕЛИЧЕНО: больше эпох для лучшей инициализации
    pop_size: 200  # УВЕЛИЧЕНО: большая популяция для лучшего поиска
    verbose: false
# SHAP отключен - чистая ANFIS
shap_reg:
  enabled: false  # ОТКЛЮЧЕНО - только чистая ANFIS
output:
  results_dir: results
  save_model: true
  save_predictions: true
  save_plots: true
  save_samples: true
  sample_size: 5

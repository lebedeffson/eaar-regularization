dataset:
  train_data: data/energy_efficiency.csv
  test_size: 0.2
  random_state: 42
  feature_columns:
    - relative_compactness
    - surface_area
    - wall_area
    - roof_area
    - overall_height
    - orientation
    - glazing_area
    - glazing_area_distribution
  target_columns:
    - heating_load
    - cooling_load

model:
  seed: 42
  epochs: 180
  batch_size: 64
  lr: 0.001
  dropout: 0.05
  hidden_dim: 128
  n_blocks: 2

shap_reg:
  enabled: true
  gamma: 0.03
  error_importance_mode: permute
  error_importance_ema_beta: 0.9
  ea_alignment_loss: cosine_mse
  ea_alignment_alpha: 0.5
  ea_warmup_fraction: 0.2

output:
  results_dir: results/energy_resmlp_ea
